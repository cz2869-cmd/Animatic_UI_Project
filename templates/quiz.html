<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animator Quiz — Question {{ question_id }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #101010;
            color: #fff;
            font-family: 'Times New Roman', Times, serif;
            min-height: 100vh;
        }
        .quiz-card {
            background-color: #1b1b1b;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
        }
        .quiz-title {
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
        }
        .option-btn {
            text-align: left;
            padding: 14px 18px;
            border: 1px solid #3a3a3a;
            background-color: #202020;
            color: #fff;
            border-radius: 6px;
            transition: background-color 0.15s, border-color 0.15s;
            width: 100%;
            font-size: 18px;
        }
        .option-btn:hover {
            background-color: #2b2b2b;
            border-color: #00942f;
        }
        .option-btn.selected {
            background-color: #00942f;
            border-color: #00942f;
            color: #fff;
        }
        .progress {
            height: 6px;
            background-color: #2a2a2a;
        }
        .progress-bar {
            background-color: #00942f;
        }
        #next-btn {
            background-color: #00942f;
            border: none;
        }
        #next-btn:disabled {
            background-color: #444;
        }
    </style>
</head>
<body>
    <main class="container py-5" style="max-width: 720px;">
        <h1 class="quiz-title text-center mb-4">ANIMATOR QUIZ</h1>

        <div class="mb-2 d-flex justify-content-between">
            <small>Question {{ question_id }} of {{ total }}</small>
            <small><a href="/" class="text-white-50">Home</a></small>
        </div>
        <div class="progress mb-4" role="progressbar"
             aria-valuenow="{{ question_id }}" aria-valuemin="0" aria-valuemax="{{ total }}">
            <div class="progress-bar" style="width: {{ (question_id / total * 100)|round(0) }}%"></div>
        </div>

        <div class="quiz-card p-4 p-md-5">
            <h2 class="h4 mb-4">{{ question.question }}</h2>

            <div id="options" class="d-grid gap-3">
                {% for option in question.options %}
                    <button type="button"
                            class="option-btn"
                            data-index="{{ loop.index0 }}">
                        {{ ['A','B','C','D','E','F'][loop.index0] }}. {{ option }}
                    </button>
                {% endfor %}
            </div>

            <div class="d-flex justify-content-between align-items-center mt-4">
                {% if question_id > 1 %}
                    <a href="/quiz/{{ question_id - 1 }}" class="btn btn-outline-light">Back</a>
                {% else %}
                    <span></span>
                {% endif %}
                <button id="next-btn" class="btn btn-success" disabled>
                    {% if question_id < total %}Next{% else %}See Results{% endif %}
                </button>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(function () {
            var questionId = {{ question_id }};
            var previousAnswer = {{ previous_answer | tojson if previous_answer is not none else 'null' }};
            var selectedIndex = null;

            if (previousAnswer && typeof previousAnswer.selected_index === 'number') {
                selectedIndex = previousAnswer.selected_index;
                $('.option-btn[data-index="' + selectedIndex + '"]').addClass('selected');
                $('#next-btn').prop('disabled', false);
            }

            $('.option-btn').on('click', function () {
                $('.option-btn').removeClass('selected');
                $(this).addClass('selected');
                selectedIndex = parseInt($(this).data('index'), 10);
                $('#next-btn').prop('disabled', false);
            });

            $('#next-btn').on('click', function () {
                if (selectedIndex === null) return;
                var $btn = $(this).prop('disabled', true).text('Saving...');

                $.ajax({
                    url: '/quiz/' + questionId + '/answer',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ selected_index: selectedIndex })
                }).done(function (resp) {
                    window.location.href = resp.next_url;
                }).fail(function () {
                    alert('Could not save your answer. Please try again.');
                    $btn.prop('disabled', false).text('Next');
                });
            });
        });
    </script>
</body>
</html>
