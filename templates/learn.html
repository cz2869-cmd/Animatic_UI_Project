<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animator Workspace</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='animator/animator.css') }}">
    <style>
        body {
            margin: 0;
            width: 100%;
            min-height: 100vh;
            display: block;
            background: #000000;
            font-family: 'Courier New', Courier, monospace
        }

        .workspace-page {
            min-height: 100vh;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .workspace-layout {
            display: flex;
            flex-direction: row;
            gap: 3rem;
            width: 100%;
            max-width: 1200px;
            align-items: center;
            justify-content: center;
        }

        .pip-panel {
            background: white;
            border: 2px solid #00942f;
            border-radius: 8px;
            padding: 2rem;
            width: 300px;
            color: black;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .pip-name {
            font-size: 20px;
            font-weight: bold;
            color: #00942f;
            margin: 0;
        }

        .pip-dialogue {
            font-size: 16px;
            line-height: 1.5;
            min-height: 80px;
        }

        .pip-hint {
            font-size: 14px;
            line-height: 1.4;
            color: #fff;
            min-height: 48px;
            margin-top: 0.75rem;
            max-width: 300px;
        }

        .hint-row {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: flex-start;
            padding-top: 1rem;
            margin-left: 2rem;
        }

        .pip-btn {
            background-color:#333333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            font-family: inherit;
            align-self: flex-start;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .pip-btn:hover {
            background-color: #00942f;
            border-color: #00942f;
        }

        .mission-panel {
            background: white;
            border: 2px solid #00942f;
            border-radius: 8px;
            padding: 2rem;
            width: 300px;
            color: black;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mission-name {
            font-size: 20px;
            font-weight: bold;
            color: #00942f;
            margin: 0;
        }

        .mission-text {
            font-size: 16px;
            line-height: 1.5;
            min-height: 120px;
        }

        .workspace-stage {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: none;
            padding: 0;
        }

        .animator-module {
            width: 100%;
            max-width: 800px;
            min-width: 320px;
            margin: 0 auto;
        }

        .learn-actions {
            width: 100%;
            max-width: 800px;
            margin: 1.5rem auto 0;
            display: none;
            justify-content: flex-end;
        }

        .quiz-link-btn {
            background-color: #00942f;
            color: #fff;
            border: none;
            padding: 10px 22px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            letter-spacing: 1px;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .quiz-link-btn:hover {
            background-color: #007424;
            color: #fff;
        }
    </style>
</head>
<body>
    <main class="workspace-page">
        <div class="workspace-layout">
            <aside class="pip-panel">
                <h2 class="pip-name">PIP says:</h2>
                <div class="pip-dialogue" id="pip-text">
                    Hi, I’m Pip! I’ll be your guide as you create your first animation.
                </div>
                <button class="pip-btn" id="pip-next-btn">Next Step</button>
            </aside>
            <div class="workspace-stage" id="workspace-stage">
                {% set animator_id = 'lesson-base' %}
                {% set file_name = 'lesson-1.ani' %}
                {% set fps = 12 %}
                {% set max_frames = 30 %}
                {% include 'components/animator_canvas.html' %}
            </div>
            <aside class="mission-panel">
                <h2 class="mission-name">Mission</h2>
                <div class="mission-text" id="mission-text"></div>
            </aside>

        </div>

        <div class="hint-row">
            <div class="pip-hint" id="pip-hint"></div>
        </div>

        <div class="learn-actions">
            <button class="quiz-link-btn" id="quiz-btn">Take the Quiz &rarr;</button>
        </div>
    </main>

    <script src="{{ url_for('static', filename='animator/animator.js') }}"></script>

    <script>
        window.addEventListener('DOMContentLoaded', function () {
            window.AnimaticCanvasModule.mount('#animator-root-lesson-base', {
                draggable: false
            });
            let frameCount = 0;

            const addFrameBtn = document.querySelector('[data-action="add-frame"]');
            if (addFrameBtn) {
                addFrameBtn.addEventListener('click', function() {
                    frameCount++;
                });
            }
            const pipText = document.getElementById('pip-text');
            const pipHint = document.getElementById('pip-hint');
            const missionText = document.getElementById('mission-text');
            const pipNextBtn = document.getElementById('pip-next-btn');
            const learnActions = document.querySelector('.learn-actions');

            const dialogues = [
                "Hi, I’m Pip! I’ll be your guide as you create your first animation.",
                "At the end of this tutorial, you will have something like this:",
                "I’ve already placed the “ground” for you! First, draw a circle. Think about where you’d want to draw the circle.",
                "Great! Now click the onion skin tool. The onion tool allows you to keep track of your previous and future frames.",
                "Create a new frame.",
                "Now you’re ready! Keep drawing the ball as it moves closer to the ground. Do this until the ball hits the ground!",
                "You’ve got the hang of it! Do the exact same thing, but this time with the ball bouncing back up. Stop when the ball is as high as the first frame. Can you guess why?",
                "Hit the 'Play' button to see your animation in action!",
                "Congratulations, you just created your first animation! Play your animation and it’ll run through your frames quickly."
            ];

            const hints = {
                2: "Hint: Where would the ball start if you were dropped it?",
                9: "Hint: You’ll need to add more frames each time you move the ball."
            };

            const mission = [
                "Click next.",
                "Click next.",
                "Draw a ball. Consider the placement. Click next when finished.",
                "Click the onion skin tool.",
                "Create a new frame.",
                "Create more frames as you draw the ball moving downward. Click next when you’re finished.",
                "Create more frames as you draw the ball moving upward. Click next when you’re finished.",
                "Click play. Click next when you’re ready for the quiz!"
            ]

            let step = 0;

            const updatePip = function () {
                pipText.textContent = dialogues[step];
                pipHint.textContent = hints[step] || '';
                missionText.textContent = mission[step] || '';
            };

            pipNextBtn.addEventListener('click', function () {
                step++;
                if (step < dialogues.length) {
                    updatePip();
                }
                if (step === dialogues.length - 1) {
                    learnActions.style.display = 'flex';
                    pipNextBtn.style.display = 'none';
                }
            });

            updatePip();

            document.getElementById('quiz-btn').addEventListener('click', function() {
                fetch('/save_frame_count', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ frame_count: frameCount })
                }).then(response => response.json()).then(data => {
                    if (data.ok) {
                        window.location.href = '/quiz/1';
                    }
                });
            });
        });
    </script>
</body>
</html>
