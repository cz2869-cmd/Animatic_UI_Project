<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animator Workspace</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='animator/animator.css') }}">
    <style>
        body {
            margin: 0;
            width: 100%;
            min-height: 100vh;
            display: block;
            background: #000000;
            font-family: 'Courier New', Courier, monospace
        }

        .workspace-page {
            min-height: 100vh;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .workspace-layout {
            display: flex;
            flex-direction: row;
            gap: 3rem;
            width: 100%;
            max-width: 1200px;
            align-items: center;
            justify-content: center;
        }

        .pip-panel {
            background: white;
            border: 2px solid #00942f;
            border-radius: 8px;
            padding: 2rem;
            width: 300px;
            color: black;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .pip-name {
            font-size: 20px;
            font-weight: bold;
            color: #00942f;
            margin: 0;
        }

        .pip-dialogue {
            font-size: 16px;
            line-height: 1.5;
            min-height: 80px;
        }

        .pip-btn {
            background-color:#333333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            font-family: inherit;
            align-self: flex-start;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .pip-btn:hover {
            background-color: #00942f;
            border-color: #00942f;
        }

        .workspace-stage {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: none;
            padding: 0;
        }

        .animator-module {
            width: 100%;
            max-width: 800px;
            min-width: 320px;
            margin: 0 auto;
        }

        .learn-actions {
            width: 100%;
            max-width: 800px;
            margin: 1.5rem auto 0;
            display: none;
            justify-content: flex-end;
        }

        .quiz-link-btn {
            background-color: #00942f;
            color: #fff;
            border: none;
            padding: 10px 22px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            letter-spacing: 1px;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .quiz-link-btn:hover {
            background-color: #007424;
            color: #fff;
        }
    </style>
</head>
<body>
    <main class="workspace-page">
        <div class="workspace-layout">
            <aside class="pip-panel">
                <h2 class="pip-name">PIP says:</h2>
                <div class="pip-dialogue" id="pip-text">
                    Welcome to the Animator Workspace! Ready to make your first frame?
                </div>
                <button class="pip-btn" id="pip-next-btn">Next Step</button>
            </aside>
            <div class="workspace-stage" id="workspace-stage">
                {% set animator_id = 'lesson-base' %}
                {% set file_name = 'lesson-1.ani' %}
                {% set fps = 12 %}
                {% set max_frames = 30 %}
                {% include 'components/animator_canvas.html' %}
            </div>
        </div>

        <div class="learn-actions">
            <a href="/quiz/1" class="quiz-link-btn">Take the Quiz &rarr;</a>
        </div>
    </main>

    <script src="{{ url_for('static', filename='animator/animator.js') }}"></script>

    <script>
        window.addEventListener('DOMContentLoaded', function () {
            window.AnimaticCanvasModule.mount('#animator-root-lesson-base', {
                draggable: false
            });

            const pipText = document.getElementById('pip-text');
            const pipNextBtn = document.getElementById('pip-next-btn');
            const learnActions = document.querySelector('.learn-actions');

            const dialogues = [
                "Welcome to the Animator Workspace!",
                "Before we draw, let's quickly go over the terms to leanr the basics!",
                "A Frame is a single image in a sequence that makes up an animation.",
                "FPS stands for Frames Per Second",
                "Onion Skinning is a feature that allows you to see faint outlines of previous frames.",
                "To make it animations, you need at least 5 frames to create a smoother transition between movements.",
                "Now let's get hands-on with the canvas!",
                "Try drawing a simple shape or character in the canvas area.",
                "Use the toolbar on the left to select different tools and colors.",
                "Now add a new frame and draw the same shape slightly different to create the illusion of movement.",
                "Add 5 more frames and experiment with different movements or expressions.",
                "Hit the 'Play' button to see your animation in action!",
                "Great job! Now you can take the quiz to test your knowledge."
            ];

            let step = 0;

            pipNextBtn.addEventListener('click', function () {
                step++;
                if (step < dialogues.length) {
                    pipText.textContent = dialogues[step];
                }
                if (step === dialogues.length - 1) {
                    learnActions.style.display = 'flex';
                    pipNextBtn.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
